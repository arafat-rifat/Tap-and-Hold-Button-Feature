<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tap & Hold Button</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      #logoImage {
        transition:
          transform 150ms ease,
          box-shadow 150ms ease;
      }

      #holdButton.is-pressed #logoImage {
        transform: scale(0.94);
        box-shadow: inset 0 8px 16px rgb(15 23 42 / 0.18);
      }

      #progressRing {
        background: conic-gradient(from 0deg, #e5e7eb 0 100%);
        pointer-events: none;
        -webkit-mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 10px),
          #000 calc(100% - 10px)
        );
        mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 10px),
          #000 calc(100% - 10px)
        );
      }
    </style>
  </head>

  <body class="flex min-h-screen items-center justify-center bg-gray-100">
    <main class="space-y-4 text-center">
      <h1 class="text-2xl font-bold">Tap & Hold Demo</h1>

      <button
        id="holdButton"
        type="button"
        class="relative mx-auto block h-64 w-64 cursor-pointer touch-none rounded-full border-0 bg-transparent p-[10px]"
      >
        <img
          id="logoImage"
          src="image/RupaliCash Logo.jpg"
          alt="Tap & Hold Button"
          class="relative z-10 h-full w-full rounded-full object-cover shadow-md"
          draggable="false"
        />

        <span
          id="progressRing"
          class="absolute inset-0 rounded-full"
          aria-hidden="true"
        ></span>
      </button>

      <p id="status" class="text-gray-700">Hold for 3 seconds</p>
    </main>

    <script>
      const holdButton = document.getElementById("holdButton");
      const progressRing = document.getElementById("progressRing");
      const statusText = document.getElementById("status");

      const holdDuration = 3000;
      let animationFrameId = null;
      let holdStartTime = 0;

      function drawProgress(percent) {
        progressRing.style.background = `
          conic-gradient(
            from 0deg,
            #22c55e 0% ${percent}%,
            #e5e7eb ${percent}% 100%
          )
        `;
      }

      function startHold() {
        if (animationFrameId) return;

        holdStartTime = performance.now();
        statusText.textContent = "Holding...";
        holdButton.classList.add("is-pressed");
        drawProgress(0);

        animationFrameId = requestAnimationFrame(updateProgress);
      }

      function updateProgress(now) {
        const elapsedTime = now - holdStartTime;
        const progress = Math.min((elapsedTime / holdDuration) * 100, 100);

        drawProgress(progress);

        if (progress === 100) {
          animationFrameId = null;
          holdButton.classList.remove("is-pressed");
          statusText.textContent = "Success! Button Triggered!";
          alert("Tap & Hold Completed!");
          return;
        }

        animationFrameId = requestAnimationFrame(updateProgress);
      }

      function resetHold() {
        if (!animationFrameId) return;

        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
        holdButton.classList.remove("is-pressed");
        drawProgress(0);
        statusText.textContent = "Hold cancelled";
      }

      holdButton.addEventListener("pointerdown", startHold);
      holdButton.addEventListener("pointerup", resetHold);
      holdButton.addEventListener("pointerleave", resetHold);
      holdButton.addEventListener("pointercancel", resetHold);
    </script>
  </body>
</html>
