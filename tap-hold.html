<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tap & Hold Button</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --ring-width: 10px;
        --ring-track: #e5e7eb;
        --ring-progress: #22c55e;
        --button-shadow: 0 18px 24px rgb(15 23 42 / 0.22);
        --button-pressed-shadow: 0 8px 12px rgb(15 23 42 / 0.28);
      }

      #holdBtnContainer {
        touch-action: none;
        filter: drop-shadow(var(--button-shadow));
        transition:
          filter 160ms ease,
          transform 160ms ease;
      }

      #holdBtnContainer.is-pressed {
        filter: drop-shadow(var(--button-pressed-shadow));
        transform: translateY(4px) scale(0.98);
      }

      #holdBtn {
        box-shadow:
          inset 0 8px 14px rgb(255 255 255 / 0.45),
          inset 0 -10px 18px rgb(15 23 42 / 0.18);
      }

      #progressBorder {
        --progress: 0%;
        background: conic-gradient(
          from 0deg,
          var(--ring-progress) 0 var(--progress),
          var(--ring-track) var(--progress) 100%
        );
        pointer-events: none;
        -webkit-mask: radial-gradient(
          farthest-side,
          transparent calc(100% - var(--ring-width)),
          #000 calc(100% - var(--ring-width))
        );
        mask: radial-gradient(
          farthest-side,
          transparent calc(100% - var(--ring-width)),
          #000 calc(100% - var(--ring-width))
        );
      }
    </style>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="text-center space-y-4">
      <h1 class="text-2xl font-bold">Tap & Hold Demo</h1>

      <div
        id="holdBtnContainer"
        class="relative w-64 h-64 mx-auto cursor-pointer"
      >
        <img
          id="holdBtn"
          src="image/RupaliCash Logo.jpg"
          alt="Tap & Hold Button"
          class="w-full h-full rounded-full object-cover"
        />
        <div id="progressBorder" class="absolute inset-0 rounded-full"></div>
      </div>

      <p id="status" class="text-gray-700">Hold for 3 seconds</p>
    </div>

    <script>
      const holdButton = document.getElementById("holdBtnContainer");
      const progressRing = document.getElementById("progressBorder");
      const statusText = document.getElementById("status");
      const holdDuration = 3000;

      let holdAnimationFrame;
      let holdStartTime = 0;
      let isHolding = false;
      let isComplete = false;
      let progressValue = 0;

      function setProgress(value) {
        progressValue = Math.min(Math.max(value, 0), 100);
        progressRing.style.setProperty("--progress", `${progressValue}%`);
      }

      function startHold() {
        if (isHolding) return;

        cancelAnimationFrame(holdAnimationFrame);
        isHolding = true;
        isComplete = false;
        holdStartTime = performance.now();
        setProgress(0);
        holdButton.classList.add("is-pressed");
        statusText.innerText = "Holding...";

        function animateHold(now) {
          const elapsed = now - holdStartTime;
          setProgress((elapsed / holdDuration) * 100);

          if (progressValue >= 100) {
            isHolding = false;
            isComplete = true;
            setProgress(100);
            holdButton.classList.remove("is-pressed");
            statusText.innerText = "Success! Button Triggered!";
            alert("Tap & Hold Completed!");
            return;
          }

          holdAnimationFrame = requestAnimationFrame(animateHold);
        }

        holdAnimationFrame = requestAnimationFrame(animateHold);
      }

      function cancelHold() {
        if (!isHolding) return;

        cancelAnimationFrame(holdAnimationFrame);
        isHolding = false;
        holdButton.classList.remove("is-pressed");

        if (!isComplete) {
          setProgress(0);
          statusText.innerText = "Hold cancelled";
        }
      }

      holdButton.addEventListener("pointerdown", startHold);
      holdButton.addEventListener("pointerup", cancelHold);
      holdButton.addEventListener("pointerleave", cancelHold);
      holdButton.addEventListener("pointercancel", cancelHold);
    </script>
  </body>
</html>
